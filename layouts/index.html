<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }}</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f5f6;
      color: #202224;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }

    p {
      margin: 0 0 1.25rem;
      color: #4d5258;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0.75rem;
    }

    a {
      display: block;
      padding: 0.9rem 1rem;
      border: 1px solid #d8dce1;
      border-radius: 8px;
      background: #fff;
      color: #202224;
      text-decoration: none;
    }

    a:hover {
      border-color: #b9c0c8;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Style Trials</h1>
    <p>Available variants:</p>
    <ul>
      <li><a href="/casette-futurism/">Casette Futurism</a></li>
      <li><a href="/claude-darkroom-take/">Claude Darkroom Take</a></li>
      <li><a href="/claude-fallout-try/">Claude Fallout Try</a></li>
      <li><a href="/claude-stalker-try/">Claude Stalker Try</a></li>
      <li><a href="/gemini-neo-brutalist/">Gemini Neo Brutalist</a></li>
    </ul>
  </main>
</body>
</html>
