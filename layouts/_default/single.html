<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — diachkow.dev</title>
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ "css/variables.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/base.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/single.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}">
</head>
<body>

<div class="titlebar">
  <div class="titlebar-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="titlebar-title">vitalii@web: ~/blog/posts/{{ .File.ContentBaseName }}</div>
</div>

<main class="terminal terminal--article">

  <a href="{{ "/" | relURL }}" class="back-link">&larr; cd ..</a>

  <header class="article-header">
    <h1 class="article-title">{{ .Title }}</h1>
    <div class="article-meta">
      <span>date: <span class="number">{{ .Date.Format "2006-01-02" }}</span></span>
      {{ with .Params.tags }}
      <span>&middot; tags: [{{ range $i, $t := . }}{{ if $i }}, {{ end }}<span class="tag">"{{ $t }}"</span>{{ end }}]</span>
      {{ end }}
    </div>
  </header>

  <article class="article-body">
    {{ .Content }}
  </article>

</main>

<!-- Tmux status line -->
<div class="tmux-bar">
  <div class="tmux-left">
    <span class="tmux-indicator">tmux</span>
  </div>
  <div class="tmux-center">
    <a href="/" class="tmux-window">0:home</a>
  </div>
  <div class="tmux-right">
    <span class="tmux-session">blog</span>
  </div>
</div>

</body>
</html>
